name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Run swift test
        run: swift test

  integration-smoke:
    name: Integration smoke test
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Run installed-app smoke test
        run: ./scripts/smoke_test_install.sh

      - name: Upload smoke test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-diagnostics
          path: ${{ runner.temp }}/codex-toolbar-smoke-test
          if-no-files-found: ignore
